<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diagnóstico Supabase | Polícia Penal Ceará</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase/config.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/supabase-health.js"></script>
</head>
<body>
  <main class="container" style="padding:60px 0">
    <section class="card" style="padding:30px">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Conexão com o Supabase</h1>
      <p class="muted" data-message>Verificando...</p>
      <pre data-details style="white-space:pre-wrap;padding:16px;border:1px solid var(--line);border-radius:12px"></pre>
      <a class="button secondary" href="index.html">Voltar ao site</a>
    </section>
  </main>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const message = document.querySelector("[data-message]");
      const details = document.querySelector("[data-details]");
      try {
        const data = await SupabaseHealth.check();
        message.textContent = "Conexão estabelecida com sucesso.";
        details.textContent = JSON.stringify({
          configured: true,
          projectUrl: window.SUPABASE_URL,
          settings: data
        }, null, 2);
      } catch (error) {
        message.textContent = "A conexão falhou.";
        details.textContent = JSON.stringify({
          configured: Boolean(window.supabaseClient),
          projectUrl: window.SUPABASE_URL,
          error: error.message,
          code: error.code || null
        }, null, 2);
      }
    });
  </script>
</body>
</html>
