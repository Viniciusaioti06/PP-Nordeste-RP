<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Configuração Inicial | Polícia Penal Ceará</title><link rel="stylesheet" href="../css/variables.css"><link rel="stylesheet" href="../css/global.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/animations.css"><link rel="stylesheet" href="../css/dashboard.css"><script defer src="../js/storage.js"></script><script defer src="../js/configuracao-inicial.js"></script></head><body><main class="login-screen"><section class="login-visual"><a class="brand" href="../index.html"><span class="brand-mark"><img class="brand-logo-image" src="../assets/images/logo-policia-penal-ceara.png" alt="Logo Polícia Penal Ceará"></span><span class="brand-copy"><strong>Polícia Penal Ceará</strong><small>Sistema Oficial</small></span></a><div><span class="eyebrow">PRIMEIRO ACESSO</span><h1>Configure o administrador principal.</h1><p>Este cadastro será responsável pelo controle inicial da equipe, permissões e configurações.</p></div></section><section class="login-side"><form id="initial-setup-form" class="login-card card"><span class="eyebrow">CONFIGURAÇÃO INICIAL</span><h2>Criar administrador</h2><p class="muted">Preencha os dados oficiais do primeiro responsável pelo sistema.</p><label class="field"><span>Nome completo</span><input name="name" required></label><label class="field"><span>Nome de usuário</span><input name="username" required></label><label class="field"><span>E-mail</span><input name="email" type="email" required></label><label class="field"><span>Discord</span><input name="discord" required></label><label class="field"><span>Senha</span><input name="password" type="password" required></label><label class="field"><span>Confirmar senha</span><input name="confirmPassword" type="password" required></label><small class="error" data-setup-error></small><button class="button primary" type="submit">Concluir
