<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Análise de Candidato | Polícia Penal</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/animations.css">

<link rel="stylesheet" href="../css/dashboard.css">
<script defer src="../js/storage.js"></script><script defer src="../js/app.js"></script><script defer src="../js/candidato-admin.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase/config.js"></script>
</head><body class="admin-body">
<main class="admin-main" style="margin-left:0" data-page>
  <header class="admin-topbar"><div><button class="button secondary small" data-back>← Voltar</button><span class="eyebrow" style="display:block;margin-top:18px">ANÁLISE COMPLETA</span><h1 data-name></h1></div><span class="status-pill" data-status></span></header>
  <section class="candidate-page-grid">
    <article class="profile-card panel-card"><h2>Perfil do candidato</h2><div class="profile-list"><div><span>Protocolo</span><strong data-protocol></strong></div><div><span>Passaporte</span><strong data-passport></strong></div><div><span>Discord</span><strong data-discord></strong></div><div><span>Disponibilidade</span><strong data-availability></strong></div><div><span>Experiência</span><strong data-experience></strong></div><div><span>Pontuação automática</span><strong data-score></strong></div><div><span>Data de envio</span><strong data-created></strong></div></div></article>
    <article class="answers-card panel-card"><h2>Respostas abertas</h2><div data-answers></div><div class="review-actions"><textarea data-notes placeholder="Observações internas do recrutador"></textarea><button class="button primary" data-approve>Aprovar no teste teórico</button><button class="button danger" data-reject>Reprovar no teste teórico</button>
<button class="button primary hidden" data-physical-approve>Aprovar no teste físico</button>
<button class="button danger hidden" data-physical-reject>Reprovar no teste físico</button></div></article>
  </section>
</main></body></html>
